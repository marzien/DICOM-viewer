spring.application.name=imaging-api
server.port=8080

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/imaging}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:imaging}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:imaging_secret}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Orthanc
orthanc.base-url=${ORTHANC_BASE_URL:http://localhost:8042}
orthanc.username=${ORTHANC_USERNAME:admin}
orthanc.password=${ORTHANC_PASSWORD:orthanc}

# AI Inference
ai.inference.url=${AI_INFERENCE_URL:http://localhost:8000}

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket=${MINIO_BUCKET:ai-results}

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Async
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
