server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — resolves service names at request time, not at startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy WADO-RS and QIDO-RS to imaging-api, preserving the full URI
    location /wado/ {
        set $upstream http://imaging-api:8080$request_uri;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # Proxy AI job endpoints to imaging-api
    location /ai/ {
        set $upstream http://imaging-api:8080$request_uri;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Actuator health
    location /actuator/ {
        set $upstream http://imaging-api:8080$request_uri;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Angular SPA — all non-asset routes fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html so the SPA is always fresh
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
    gzip_min_length 1024;
}
